<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>AskIt - AI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>AskIt</h1>
        <span class="badge">Max</span>
      </div>
      <button id="settingsBtn" class="icon-btn">⚙️</button>
    </header>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="preset-section">
        <label>Quick Preset</label>
        <div class="preset-buttons">
          <button id="presetMinimax" class="preset-btn active">MiniMax</button>
          <button id="presetDeepseek" class="preset-btn">DeepSeek</button>
        </div>
      </div>

      <div class="setting-item">
        <label>API Provider</label>
        <select id="apiProvider">
          <option value="minimax">MiniMax</option>
          <option value="deepseek">DeepSeek</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="setting-item">
        <label>API Base URL</label>
        <input type="text" id="apiBase" placeholder="https://api.minimaxi.com/v1" value="https://api.minimaxi.com/v1">
      </div>
      <div class="setting-item">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
      <div class="setting-item">
        <label>Model</label>
        <input type="text" id="modelName" placeholder="MiniMax-M2.7" value="MiniMax-M2.7">
      </div>
      <div class="setting-item">
        <label>Temperature: <span id="tempValue">0.7</span></label>
        <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
      </div>
      <div class="setting-item">
        <label>Max Tokens</label>
        <input type="number" id="maxTokens" value="2048" min="100" max="32000">
      </div>
      <button id="saveSettings" class="btn primary">Save Settings</button>
      <hr>
    </div>

    <div id="chatContainer">
      <div id="messages"></div>
      <div id="welcome" class="welcome">
        <div class="welcome-icon">🤖</div>
        <p>AskIt - Powered by <span id="providerName">MiniMax</span></p>
        <p class="model-info">Model: <span id="currentModel">MiniMax-M2.7</span></p>
        <p class="hint">Select text → Right-click → "Ask with AskIt"</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Type your question..." rows="2"></textarea>
      <button id="sendBtn" class="btn send">➤</button>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Thinking...</span>
    </div>

    <div class="footer">
      <span id="tokenCount">0 tokens</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
