<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>AskIt - All-in-One AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>AskIt</h1>
        <span class="badge">Max</span>
      </div>
      <div class="header-right">
        <span id="tokenCount" class="token-badge">0 tokens</span>
        <button id="settingsBtn" class="icon-btn">⚙️</button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="chat">💬 Chat</button>
      <button class="tab" data-tab="image">🖼️ Image</button>
      <button class="tab" data-tab="vision">👁️ Vision</button>
      <button class="tab" data-tab="tts">🎤 TTS</button>
      <button class="tab" data-tab="music">🎵 Music</button>
    </nav>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="preset-section">
        <label>Quick Preset</label>
        <div class="preset-buttons">
          <button class="preset-btn active" data-provider="minimax">MiniMax</button>
          <button class="preset-btn" data-provider="deepseek">DeepSeek</button>
          <button class="preset-btn" data-provider="openai">OpenAI</button>
        </div>
      </div>

      <div class="setting-item">
        <label>API Provider</label>
        <select id="apiProvider">
          <option value="minimax">MiniMax</option>
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="setting-item">
        <label>API Base URL</label>
        <input type="text" id="apiBase" placeholder="https://api.minimaxi.com/v1" value="https://api.minimaxi.com/v1">
      </div>
      <div class="setting-item">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
      <div class="setting-item">
        <label>Default Model</label>
        <input type="text" id="modelName" placeholder="MiniMax-M2.7" value="MiniMax-M2.7">
      </div>
      <div class="setting-item">
        <label>Temperature: <span id="tempValue">0.7</span></label>
        <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
      </div>
      <button id="saveSettings" class="btn primary">Save Settings</button>
      <hr>
    </div>

    <!-- Chat Tab -->
    <div id="chatTab" class="tab-content active">
      <div id="chatContainer">
        <div id="messages"></div>
        <div id="welcome" class="welcome">
          <div class="welcome-icon">🤖</div>
          <p>AskIt - All-in-One AI Assistant</p>
          <p class="hint">Powered by <span id="providerLabel">MiniMax</span></p>
        </div>
      </div>
      <div class="input-area">
        <textarea id="chatInput" placeholder="Ask anything..." rows="2"></textarea>
        <button class="btn send">➤</button>
      </div>
      <button id="clearHistory" class="btn secondary" style="margin-top: 8px; width: 100%;">🗑️ Clear History</button>
    </div>

    <!-- Image Generation Tab -->
    <div id="imageTab" class="tab-content">
      <div class="tool-container">
        <div class="tool-header">
          <h3>🎨 Image Generation</h3>
        </div>
        <div class="tool-body">
          <div class="setting-item">
            <label>Prompt</label>
            <textarea id="imagePrompt" placeholder="A beautiful sunset over the ocean..." rows="3"></textarea>
          </div>
          <div class="setting-item">
            <label>Size</label>
            <select id="imageSize">
              <option value="1024x1024">1024 x 1024</option>
              <option value="1536x1024">1536 x 1024 (3:2)</option>
              <option value="1024x1536">1024 x 1536 (2:3)</option>
              <option value="1920x1080">1920 x 1080 (16:9)</option>
            </select>
          </div>
          <div class="setting-item">
            <label>Model</label>
            <select id="imageModel">
              <option value="image-01">image-01 (MiniMax)</option>
            </select>
          </div>
          <button id="generateImage" class="btn primary">Generate Image</button>
          <div id="imageResult" class="result-area"></div>
        </div>
      </div>
    </div>

    <!-- Vision Tab -->
    <div id="visionTab" class="tab-content">
      <div class="tool-container">
        <div class="tool-header">
          <h3>👁️ Image Recognition</h3>
        </div>
        <div class="tool-body">
          <div class="setting-item">
            <label>Upload Image</label>
            <input type="file" id="visionImage" accept="image/*" class="file-input">
          </div>
          <div id="visionPreview" class="image-preview hidden"></div>
          <div class="setting-item">
            <label>Question</label>
            <textarea id="visionQuestion" placeholder="What is in this image?" rows="2"></textarea>
          </div>
          <button id="analyzeImage" class="btn primary">Analyze Image</button>
          <div id="visionResult" class="result-area"></div>
        </div>
      </div>
    </div>

    <!-- TTS Tab -->
    <div id="ttsTab" class="tab-content">
      <div class="tool-container">
        <div class="tool-header">
          <h3>🎤 Text to Speech</h3>
        </div>
        <div class="tool-body">
          <div class="setting-item">
            <label>Text</label>
            <textarea id="ttsText" placeholder="Enter text to convert to speech..." rows="4"></textarea>
          </div>
          <div class="setting-item">
            <label>Voice</label>
            <select id="ttsVoice">
              <option value="male-qn-qingse">male-qn-qingse (Female, Young)</option>
              <option value="female-qn-yujie">female-qn-yujie (Female, Mature)</option>
              <option value="male-qn-qingyue">male-qn-qingyue (Male, Young)</option>
              <option value="male-qn-qiankun">male-qn-qiankun (Male, Deep)</option>
            </select>
          </div>
          <div class="setting-item">
            <label>Speed (0.5 - 2.0)</label>
            <input type="range" id="ttsSpeed" min="0.5" max="2" step="0.1" value="1">
            <span id="ttsSpeedValue">1.0</span>
          </div>
          <button id="generateTTS" class="btn primary">Generate Speech</button>
          <div id="ttsResult" class="result-area"></div>
        </div>
      </div>
    </div>

    <!-- Music Tab -->
    <div id="musicTab" class="tab-content">
      <div class="tool-container">
        <div class="tool-header">
          <h3>🎵 Music + Lyrics</h3>
        </div>
        <div class="tool-body">
          <div class="setting-item">
            <label>Theme / Topic</label>
            <textarea id="musicTheme" placeholder="A love story about longing and reunion..." rows="2"></textarea>
          </div>
          <button id="generateLyrics" class="btn secondary">✨ Generate Lyrics First</button>
          <div id="lyricsResult" class="lyrics-area hidden">
            <div class="setting-item">
              <label>Generated Lyrics</label>
              <textarea id="lyricsText" rows="6" placeholder="Generated lyrics will appear here..."></textarea>
            </div>
          </div>
          <div class="setting-item">
            <label>Music Style</label>
            <textarea id="musicStyle" placeholder="Pop ballad, emotional, piano accompaniment..." rows="2"></textarea>
          </div>
          <div class="setting-item">
            <label>Duration</label>
            <select id="musicDuration">
              <option value="5">5 seconds</option>
              <option value="10">10 seconds</option>
              <option value="30">30 seconds</option>
              <option value="60">60 seconds</option>
            </select>
          </div>
          <button id="generateMusicWithLyrics" class="btn primary">🎵 Generate Music with Lyrics</button>
          <div id="musicResult" class="result-area"></div>
          <div id="musicHistory" class="music-history hidden">
            <div class="history-header">
              <span>📜 Recent Music</span>
              <button id="clearMusicHistory" class="icon-btn" style="font-size:12px;padding:2px 6px;">🗑️</button>
            </div>
            <div id="musicHistoryList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span id="loadingText">Processing...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
